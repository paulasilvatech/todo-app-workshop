# Docker Compose override for local development
# Enables hot-reload via volume mounts and docker compose watch

services:
  backend:
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
    develop:
      watch:
        - action: sync
          path: ./backend/src
          target: /app/src
        - action: rebuild
          path: ./backend/package.json
        - action: rebuild
          path: ./backend/prisma/schema.prisma

  frontend:
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    develop:
      watch:
        - action: sync
          path: ./frontend/src
          target: /app/src
        - action: rebuild
          path: ./frontend/package.json
